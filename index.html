<!DOCTYPE html>
<html>
<head>
    <title>Log Book</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            color: white;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background-color: white;
            color: black;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 600px;
            box-sizing: border-box;
            position: relative;
        }
        .form-container::before {
            content: '';
            display: block;
            height: 15px;
            background-color: #d6ff9c;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        h1 {
            font-weight: bold;
            color: black;
            text-align: center;
        }
        h5 {
            font-weight: 80;
            text-align: center;
            color: black;
        }
        label, input, select, option {
            color: black;
            font-family: 'Poppins', sans-serif;
        }
        input[type="text"], input[type="date"], select {
            background-color: #f0f0f0;
            color: black;
            border: 1px solid #ccc;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
        }
        .submit-button {
            background-color: #d6ff9c;
            color: black;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 12px;
            width: 100%;
        }
        .footer {
            text-align: left;
            margin-top: 20px;
            color: black;
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
        }
        .thank-you {
            text-align: center;
            font-size: 18px;
            color: black;
            margin-top: 20px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script>
        async function fetchIP() {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            document.getElementById('ipField').value = data.ip;
        }

        window.onload = function() {
            fetchIP();

            const form = document.getElementById('myForm');
            form.addEventListener('submit', async function(e) {
                e.preventDefault(); // prevent redirect

                const formData = new FormData(form);

                try {
                    await fetch(form.action, {
                        method: 'POST',
                        body: formData
                    });

                    // Replace form with thank-you message
                    form.innerHTML = '<p class="thank-you">✅ Thank you! Your log has been recorded.</p>';
                } catch (error) {
                    form.innerHTML = '<p class="thank-you" style="color:red;">❌ Something went wrong. Please try again.</p>';
                }
            });
        };
    </script>
</head>
